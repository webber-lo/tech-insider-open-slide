<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECH INSIDER Structure Workbench</title>
    <style>
      :root {
        --ink: #102a3a;
        --muted: #607684;
        --navy: #0f2854;
        --royal: #1c4d8d;
        --blue: #4988c4;
        --pale: #bde8f5;
        --paper: #f7f8f0;
        --cream: #fbfaf4;
        --line: #cfe0ea;
        --white: #ffffff;
        --amber: #c98b42;
        --ok: #2e8f7d;
        --shadow: 0 22px 70px rgba(16, 42, 58, 0.12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        background: linear-gradient(90deg, rgba(247, 248, 240, 0.96), rgba(239, 246, 249, 0.96)), var(--paper);
      }

      button, textarea, select, input { font: inherit; }
      button { cursor: pointer; }
      h1, h2, h3, p { margin: 0; }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 64px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        border-bottom: 1px solid rgba(207, 224, 234, 0.9);
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--navy);
        font-weight: 900;
      }

      .seal {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: var(--white);
        background: var(--navy);
        font-size: 12px;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .shell {
        display: grid;
        grid-template-columns: 220px minmax(430px, 600px) minmax(560px, 1fr);
        gap: 18px;
        padding: 20px;
      }

      .rail, .panel, .preview-panel {
        border: 1px solid rgba(207, 224, 234, 0.95);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .rail {
        border-radius: 18px;
        padding: 16px;
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .step {
        width: 100%;
        display: grid;
        grid-template-columns: 32px 1fr;
        gap: 10px;
        align-items: start;
        padding: 14px 10px;
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: var(--muted);
        text-align: left;
      }

      .step.active {
        background: rgba(189, 232, 245, 0.44);
        color: var(--navy);
      }

      .step.done .step-num { background: var(--ok); }

      .step-num {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--white);
        background: var(--royal);
        font-size: 12px;
        font-weight: 900;
      }

      .step-title {
        display: block;
        color: inherit;
        font-size: 14px;
        font-weight: 900;
      }

      .step-text {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.45;
      }

      .panel {
        min-height: calc(100vh - 104px);
        border-radius: 18px;
        overflow: hidden;
      }

      .panel-head {
        padding: 24px 26px 18px;
        border-bottom: 1px solid rgba(207, 224, 234, 0.86);
      }

      .eyebrow {
        margin-bottom: 8px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        color: var(--navy);
        font-size: 26px;
        line-height: 1.25;
      }

      h2 {
        color: var(--navy);
        font-size: 20px;
        line-height: 1.3;
      }

      .desc {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .panel-body { padding: 22px 26px 26px; }
      .screen { display: none; }
      .screen.active { display: block; }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      textarea, select, input {
        width: 100%;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 12px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.92);
      }

      textarea {
        min-height: 260px;
        padding: 16px;
        resize: vertical;
        line-height: 1.7;
      }

      select, input {
        height: 42px;
        padding: 0 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .field { margin-bottom: 18px; }

      .button {
        width: 100%;
        height: 48px;
        border: 0;
        border-radius: 12px;
        color: var(--white);
        background: var(--royal);
        font-weight: 900;
      }

      .button.primary { background: var(--amber); }
      .button.ghost { color: var(--royal); background: rgba(189, 232, 245, 0.36); }
      .button:disabled, .small-button:disabled { opacity: 0.55; cursor: default; }

      .action-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .action-row.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

      .small-button {
        height: 38px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 10px;
        color: var(--royal);
        background: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        font-weight: 900;
      }

      .editor-card {
        padding: 16px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 16px;
        background: rgba(247, 248, 240, 0.58);
      }

      .editor-card + .editor-card { margin-top: 14px; }
      .mini-input { min-height: 92px; }

      .block-list {
        display: grid;
        gap: 10px;
      }

      .block-editor {
        display: grid;
        grid-template-columns: 120px 1fr 34px;
        gap: 8px;
        align-items: center;
      }

      .block-editor input { height: 38px; }

      .remove-block {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 9px;
        color: var(--muted);
        background: rgba(207, 224, 234, 0.46);
        font-weight: 900;
      }

      .layout-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .layout-card {
        padding: 12px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        text-align: left;
      }

      .layout-card.active {
        border-color: rgba(73, 136, 196, 0.95);
        background: #eef8fb;
      }

      .layout-card strong {
        display: block;
        margin-bottom: 4px;
        color: var(--navy);
        font-size: 13px;
      }

      .layout-card span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .page-list {
        display: grid;
        gap: 10px;
      }

      .page-row {
        width: 100%;
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.86);
        text-align: left;
      }

      .page-row.active {
        border-color: rgba(73, 136, 196, 0.95);
        background: #eef8fb;
      }

      .page-num {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        color: var(--white);
        background: var(--navy);
        font-size: 12px;
        font-weight: 900;
      }

      .page-title {
        color: var(--navy);
        font-size: 14px;
        font-weight: 900;
        line-height: 1.35;
      }

      .page-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .badge {
        padding: 6px 8px;
        border-radius: 999px;
        color: var(--royal);
        background: rgba(189, 232, 245, 0.42);
        font-size: 11px;
        font-weight: 900;
      }

      .preview-panel {
        min-height: calc(100vh - 104px);
        border-radius: 18px;
        padding: 18px;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 16px;
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .preview-tools {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
      }

      .slide-tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .slide-tab {
        min-width: 38px;
        height: 34px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 10px;
        color: var(--royal);
        background: rgba(255, 255, 255, 0.84);
        font-size: 12px;
        font-weight: 900;
      }

      .slide-tab.active {
        color: var(--white);
        background: var(--navy);
        border-color: var(--navy);
      }

      .slide {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        background: var(--cream);
        box-shadow: 0 28px 82px rgba(16, 42, 58, 0.16);
      }

      .slide-image {
        position: absolute;
        inset: 0 0 0 44%;
        background: radial-gradient(circle at 45% 40%, rgba(73, 136, 196, 0.5), transparent 30%), linear-gradient(135deg, rgba(189, 232, 245, 0.72), rgba(255, 255, 255, 0.06));
        background-size: cover;
        background-position: center;
      }

      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background: linear-gradient(90deg, rgba(251, 250, 244, 1) 0%, rgba(251, 250, 244, 0.98) 44%, rgba(251, 250, 244, 0.78) 61%, rgba(251, 250, 244, 0.18) 84%, rgba(251, 250, 244, 0) 100%);
      }

      .slide-copy {
        position: absolute;
        z-index: 2;
        left: 5.5%;
        top: 7%;
        width: 52%;
      }

      .slide-kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 26px;
        color: var(--navy);
        font-size: 12px;
        font-weight: 900;
      }

      .slide-kicker::before {
        content: "";
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--navy);
      }

      .slide-title {
        color: var(--navy);
        font-size: clamp(24px, 2.8vw, 43px);
        font-weight: 900;
        line-height: 1.15;
      }

      .hairline {
        width: 82%;
        height: 2px;
        margin: 18px 0 16px;
        background: var(--line);
      }

      .slide-claim {
        color: var(--muted);
        font-size: clamp(12px, 1vw, 16px);
        line-height: 1.68;
      }

      .slide-blocks {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .slide-block {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 10px;
        padding: 8px 10px;
        border: 1px solid rgba(207, 224, 234, 0.92);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.76);
        font-size: 11px;
        line-height: 1.45;
      }

      .block-label {
        color: var(--royal);
        font-weight: 900;
      }

      .block-value {
        color: var(--ink);
      }

      .footer {
        position: absolute;
        z-index: 2;
        right: 5.5%;
        bottom: 2.7%;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .empty {
        padding: 26px;
        border: 1px dashed rgba(96, 118, 132, 0.42);
        border-radius: 16px;
        color: var(--muted);
        background: rgba(247, 248, 240, 0.58);
        font-size: 14px;
        line-height: 1.65;
      }

      .notice {
        display: none;
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .notice.active { display: block; }

      @media (max-width: 1260px) {
        .shell { grid-template-columns: 1fr; }
        .rail, .preview-panel { position: static; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand"><div class="seal">TI</div><div>Structure Workbench</div></div>
        <div class="status">文字 -> 精華結構 -> 框架 -> 版面</div>
      </header>

      <main class="shell">
        <nav class="rail" aria-label="workflow">
          <button class="step active" data-step="content" type="button">
            <span class="step-num">1</span>
            <span><span class="step-title">理解文字</span><span class="step-text">先讀原文，不套框架</span></span>
          </button>
          <button class="step" data-step="pages" type="button">
            <span class="step-num">2</span>
            <span><span class="step-title">精華結構</span><span class="step-text">保留原文有意義的欄位</span></span>
          </button>
          <button class="step" data-step="export" type="button">
            <span class="step-num">3</span>
            <span><span class="step-title">框架與版面</span><span class="step-text">依內容決定呈現方式</span></span>
          </button>
        </nav>

        <section class="panel">
          <div class="panel-head">
            <div class="eyebrow" id="panel-eyebrow">Step 1</div>
            <h1 id="panel-title">從文字中提煉有意義的結構</h1>
            <p class="desc" id="panel-desc">不再用固定小區塊，也不先套版型。先保留原文裡真正重要的欄位、段落、數字與限制。</p>
          </div>

          <div class="panel-body">
            <section class="screen active" id="screen-content">
              <div class="field">
                <label for="article-input">文章或資料</label>
                <textarea id="article-input">踢透 Tech Talk：動畫解釋科技事件
單元定位：用動畫與視覺化解釋科技新聞背後的事件、關係、利益與下一步。
主載體：YouTube
更新頻率：每週兩次
每集長度：5–8 分鐘
固定結構：一個事件、一張關係圖、三個商業問題
選題來源與合作：BI 外電、重大科技事件、海外授權內容</textarea>
              </div>
              <div class="row">
                <div class="field">
                  <label for="audience-input">對象</label>
                  <select id="audience-input">
                    <option>商業讀者</option>
                    <option>高階主管</option>
                    <option>內容團隊</option>
                  </select>
                </div>
                <div class="field">
                  <label for="page-count-input">頁數</label>
                  <select id="page-count-input">
                    <option value="auto">依文章指定</option>
                    <option value="8">8 頁</option>
                    <option value="12">12 頁</option>
                    <option value="3">3 頁提案</option>
                  </select>
                </div>
              </div>
              <button class="button primary" id="generate-outline" type="button">提煉內容結構</button>
              <p class="notice" id="content-notice"></p>
            </section>

            <section class="screen" id="screen-pages">
              <div id="page-editor-empty" class="empty">請先在第一步提煉內容結構。生成後，這裡會出現逐頁編輯工具。</div>
              <div id="page-editor" hidden>
                <div class="editor-card">
                  <div class="action-row" style="margin-bottom: 14px">
                    <button class="small-button" id="move-page-up" type="button">上移一頁</button>
                    <button class="small-button" id="move-page-down" type="button">下移一頁</button>
                  </div>
                  <div class="field">
                    <label for="page-title-input">本頁標題</label>
                    <input id="page-title-input" />
                  </div>
                  <div class="field">
                    <label for="page-claim-input">本頁主張</label>
                    <textarea class="mini-input" id="page-claim-input"></textarea>
                  </div>
                  <div class="field">
                    <label>內容結構 blocks</label>
                    <div class="block-list" id="block-list"></div>
                    <button class="small-button" id="add-block" type="button" style="margin-top: 10px; width: 100%">新增一個內容欄位</button>
                  </div>
                  <div class="action-row three">
                    <button class="small-button" data-ai-action="sharpen" type="button">AI 強化主張</button>
                    <button class="small-button" data-ai-action="preserve" type="button">AI 保留細節</button>
                    <button class="small-button" data-ai-action="layout" type="button">AI 建議框架</button>
                  </div>
                  <p class="notice" id="edit-notice"></p>
                </div>

                <div class="editor-card">
                  <label>本頁框架建議</label>
                  <div class="layout-grid" id="layout-grid">
                    <button class="layout-card" data-layout="Narrative" type="button"><strong>Narrative</strong><span>一頁講清楚一個主張</span></button>
                    <button class="layout-card" data-layout="List" type="button"><strong>List</strong><span>保留多個原文欄位</span></button>
                    <button class="layout-card" data-layout="Matrix" type="button"><strong>Matrix</strong><span>比較角色、條件或策略</span></button>
                    <button class="layout-card" data-layout="Timeline" type="button"><strong>Timeline</strong><span>呈現時間與發展脈絡</span></button>
                    <button class="layout-card" data-layout="Process" type="button"><strong>Process</strong><span>呈現步驟、流程或工作法</span></button>
                    <button class="layout-card" data-layout="Relationship" type="button"><strong>Relationship</strong><span>呈現事件、角色與利益關係</span></button>
                  </div>
                </div>

                <div class="editor-card">
                  <div class="field">
                    <label for="image-brief-input">無文字配圖方向</label>
                    <textarea class="mini-input" id="image-brief-input"></textarea>
                  </div>
                  <button class="button" id="generate-page-image" type="button">產生本頁配圖</button>
                  <p class="notice" id="image-notice"></p>
                </div>
              </div>
            </section>

            <section class="screen" id="screen-export">
              <div id="export-empty" class="empty">還沒有內容可以輸出。請先提煉內容結構。</div>
              <div id="export-list" class="page-list"></div>
            </section>
          </div>
        </section>

        <aside class="preview-panel">
          <div class="preview-tools">
            <div>
              <div class="eyebrow">Artifact Preview</div>
              <h2 id="preview-heading">目前預覽</h2>
              <p class="desc" id="preview-note">右側只呈現當前頁：主張加保留下來的內容結構。</p>
            </div>
            <button class="button ghost" id="go-pages" type="button" style="width: 132px">逐頁編輯</button>
          </div>
          <div class="slide-tabs" id="slide-tabs"></div>
          <div class="slide" id="artifact-slide">
            <div class="slide-image" id="slide-image" aria-hidden="true"></div>
            <div class="slide-copy">
              <div class="slide-kicker" id="slide-kicker">TECH INSIDER</div>
              <div class="slide-title" id="slide-title">先理解文字，再建立版面</div>
              <div class="hairline"></div>
              <p class="slide-claim" id="slide-claim">系統會先提煉原文裡真正重要的欄位與細節，再依內容選擇適合的框架。</p>
              <div class="slide-blocks" id="slide-blocks"></div>
            </div>
            <div class="footer" id="slide-footer">Slide 1 | Draft</div>
          </div>
        </aside>
      </main>
    </div>

    <script>
      const state = {
        step: "content",
        selected: 0,
        pages: []
      };

      const stepLabels = {
        content: ["Step 1", "從文字中提煉有意義的結構", "不再先套版型。先保留原文裡真正重要的欄位、段落、數字與限制。"],
        pages: ["Step 2", "逐頁確認精華結構", "每一頁都可以改主張、補 blocks，並讓 AI 重新保留細節。"],
        export: ["Step 3", "依結構建立框架與版面", "確認每頁的內容結構、框架建議與配圖方向。"]
      };

      const screens = {
        content: document.getElementById("screen-content"),
        pages: document.getElementById("screen-pages"),
        export: document.getElementById("screen-export")
      };

      const articleInput = document.getElementById("article-input");
      const audienceInput = document.getElementById("audience-input");
      const pageCountInput = document.getElementById("page-count-input");
      const generateOutline = document.getElementById("generate-outline");
      const generatePageImage = document.getElementById("generate-page-image");
      const contentNotice = document.getElementById("content-notice");
      const imageNotice = document.getElementById("image-notice");
      const editNotice = document.getElementById("edit-notice");
      const pageEditor = document.getElementById("page-editor");
      const pageEditorEmpty = document.getElementById("page-editor-empty");
      const pageTitleInput = document.getElementById("page-title-input");
      const pageClaimInput = document.getElementById("page-claim-input");
      const imageBriefInput = document.getElementById("image-brief-input");
      const blockList = document.getElementById("block-list");
      const addBlock = document.getElementById("add-block");
      const movePageUp = document.getElementById("move-page-up");
      const movePageDown = document.getElementById("move-page-down");
      const layoutGrid = document.getElementById("layout-grid");
      const slideTabs = document.getElementById("slide-tabs");
      const exportList = document.getElementById("export-list");
      const exportEmpty = document.getElementById("export-empty");

      const panelEyebrow = document.getElementById("panel-eyebrow");
      const panelTitle = document.getElementById("panel-title");
      const panelDesc = document.getElementById("panel-desc");
      const previewHeading = document.getElementById("preview-heading");
      const previewNote = document.getElementById("preview-note");
      const slideImage = document.getElementById("slide-image");
      const slideKicker = document.getElementById("slide-kicker");
      const slideTitle = document.getElementById("slide-title");
      const slideClaim = document.getElementById("slide-claim");
      const slideBlocks = document.getElementById("slide-blocks");
      const slideFooter = document.getElementById("slide-footer");

      function currentPage() {
        return state.pages[state.selected];
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(`API failed: ${response.status}`);
        return response.json();
      }

      function goStep(step) {
        state.step = step;
        document.querySelectorAll(".step").forEach((button) => {
          const active = button.dataset.step === step;
          button.classList.toggle("active", active);
          button.classList.toggle("done", button.dataset.step === "content" && state.pages.length > 0);
        });
        Object.entries(screens).forEach(([key, screen]) => screen.classList.toggle("active", key === step));
        const [eyebrow, title, desc] = stepLabels[step];
        panelEyebrow.textContent = eyebrow;
        panelTitle.textContent = title;
        panelDesc.textContent = desc;
        renderAll();
      }

      function normalizePages(pages) {
        return pages.map((page, index) => ({
          page: index + 1,
          title: page.title || `第 ${index + 1} 頁`,
          claim: page.claim || page.lead || "",
          blocks: normalizeBlocks(page.blocks || page.details || []),
          layoutHint: page.layoutHint || page.layout || (index === 0 ? "Narrative" : "List"),
          imageBrief: page.imageBrief || "",
          imageUrl: page.imageUrl || ""
        }));
      }

      function normalizeBlocks(blocks) {
        return Array.isArray(blocks)
          ? blocks.map((block) => ({
              label: block.label || block.name || "重點",
              value: block.value || block.text || block.content || ""
            })).filter((block) => block.label && block.value).slice(0, 8)
          : [];
      }

      function renumberPages() {
        state.pages.forEach((page, index) => {
          page.page = index + 1;
        });
      }

      function renderTabs() {
        slideTabs.innerHTML = "";
        state.pages.forEach((page, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = `slide-tab${index === state.selected ? " active" : ""}`;
          tab.textContent = page.page || index + 1;
          tab.addEventListener("click", () => {
            state.selected = index;
            renderAll();
          });
          slideTabs.appendChild(tab);
        });
      }

      function renderBlockEditors() {
        const page = currentPage();
        blockList.innerHTML = "";
        if (!page) return;
        page.blocks.forEach((block, index) => {
          const row = document.createElement("div");
          row.className = "block-editor";
          row.innerHTML = `
            <input aria-label="block label" />
            <input aria-label="block value" />
            <button class="remove-block" type="button">x</button>
          `;
          const [labelInput, valueInput] = row.querySelectorAll("input");
          labelInput.value = block.label;
          valueInput.value = block.value;
          labelInput.addEventListener("input", () => {
            page.blocks[index].label = labelInput.value;
            renderPreview();
          });
          valueInput.addEventListener("input", () => {
            page.blocks[index].value = valueInput.value;
            renderPreview();
          });
          row.querySelector("button").addEventListener("click", () => {
            page.blocks.splice(index, 1);
            renderAll();
          });
          blockList.appendChild(row);
        });
      }

      function renderEditor() {
        const page = currentPage();
        pageEditor.hidden = !page;
        pageEditorEmpty.style.display = page ? "none" : "block";
        if (!page) return;
        pageTitleInput.value = page.title;
        pageClaimInput.value = page.claim;
        imageBriefInput.value = page.imageBrief || "";
        movePageUp.disabled = state.selected === 0;
        movePageDown.disabled = state.selected === state.pages.length - 1;
        document.querySelectorAll(".layout-card").forEach((card) => {
          card.classList.toggle("active", card.dataset.layout === page.layoutHint);
        });
        renderBlockEditors();
      }

      function renderExport() {
        exportList.innerHTML = "";
        exportEmpty.style.display = state.pages.length ? "none" : "block";
        state.pages.forEach((page, index) => {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `page-row${index === state.selected ? " active" : ""}`;
          row.innerHTML = `
            <div class="page-num">${page.page || index + 1}</div>
            <div><div class="page-title"></div><div class="page-meta"></div></div>
            <div class="badge"></div>
          `;
          row.querySelector(".page-title").textContent = page.title;
          row.querySelector(".page-meta").textContent = page.blocks.map((block) => `${block.label}: ${block.value}`).join(" | ") || page.claim;
          row.querySelector(".badge").textContent = page.layoutHint || "未選框架";
          row.addEventListener("click", () => {
            state.selected = index;
            renderAll();
          });
          exportList.appendChild(row);
        });
      }

      function renderPreview() {
        const page = currentPage();
        if (!page) {
          previewHeading.textContent = "目前預覽";
          previewNote.textContent = "先提煉內容結構，這裡會顯示當前頁。";
          slideImage.style.backgroundImage = "";
          slideKicker.textContent = "STRUCTURE FIRST";
          slideTitle.textContent = "先理解文字，再建立版面";
          slideClaim.textContent = "系統會先提煉原文裡真正重要的欄位與細節，再依內容選擇適合的框架。";
          slideBlocks.innerHTML = "";
          slideFooter.textContent = "Slide 1 | Draft";
          return;
        }
        previewHeading.textContent = `Slide ${page.page || state.selected + 1}`;
        previewNote.textContent = page.layoutHint ? `${page.layoutHint} 框架` : "尚未選框架";
        slideImage.style.backgroundImage = page.imageUrl ? `url("${page.imageUrl}")` : "";
        slideKicker.textContent = `TECH INSIDER | ${page.layoutHint || "未選框架"}`;
        slideTitle.textContent = page.title;
        slideClaim.textContent = page.claim;
        slideFooter.textContent = `Slide ${page.page || state.selected + 1} | ${page.layoutHint || "Draft"}`;
        slideBlocks.innerHTML = "";
        page.blocks.slice(0, 5).forEach((block) => {
          const item = document.createElement("div");
          item.className = "slide-block";
          item.innerHTML = `<div class="block-label"></div><div class="block-value"></div>`;
          item.querySelector(".block-label").textContent = block.label;
          item.querySelector(".block-value").textContent = block.value;
          slideBlocks.appendChild(item);
        });
      }

      function renderAll() {
        renderTabs();
        renderEditor();
        renderExport();
        renderPreview();
      }

      document.querySelectorAll(".step").forEach((button) => {
        button.addEventListener("click", () => goStep(button.dataset.step));
      });

      document.getElementById("go-pages").addEventListener("click", () => goStep("pages"));

      generateOutline.addEventListener("click", async () => {
        const article = articleInput.value.trim();
        generateOutline.disabled = true;
        generateOutline.textContent = "提煉中...";
        contentNotice.classList.remove("active");
        try {
          const data = await postJson("/api/generate-outline", {
            article,
            audience: audienceInput.value,
            pageCount: pageCountInput.value,
            design: "structure-first"
          });
          state.pages = normalizePages(data.outline?.pages?.length ? data.outline.pages : []);
          state.selected = 0;
          if (!state.pages.length) throw new Error("No pages returned");
          if (!data.ok) {
            contentNotice.textContent = `缺少 API key：${(data.missingKeys || []).join(", ")}`;
            contentNotice.classList.add("active");
          }
          goStep("pages");
        } catch (error) {
          contentNotice.textContent = `提煉失敗：${error.message}`;
          contentNotice.classList.add("active");
        } finally {
          generateOutline.disabled = false;
          generateOutline.textContent = "提煉內容結構";
        }
      });

      pageTitleInput.addEventListener("input", () => {
        const page = currentPage();
        if (!page) return;
        page.title = pageTitleInput.value;
        renderPreview();
      });

      pageClaimInput.addEventListener("input", () => {
        const page = currentPage();
        if (!page) return;
        page.claim = pageClaimInput.value;
        renderPreview();
      });

      imageBriefInput.addEventListener("input", () => {
        const page = currentPage();
        if (!page) return;
        page.imageBrief = imageBriefInput.value;
      });

      addBlock.addEventListener("click", () => {
        const page = currentPage();
        if (!page) return;
        page.blocks.push({ label: "新欄位", value: "" });
        renderAll();
      });

      movePageUp.addEventListener("click", () => {
        if (state.selected <= 0) return;
        const current = state.pages[state.selected];
        state.pages[state.selected] = state.pages[state.selected - 1];
        state.pages[state.selected - 1] = current;
        state.selected -= 1;
        renumberPages();
        renderAll();
      });

      movePageDown.addEventListener("click", () => {
        if (state.selected >= state.pages.length - 1) return;
        const current = state.pages[state.selected];
        state.pages[state.selected] = state.pages[state.selected + 1];
        state.pages[state.selected + 1] = current;
        state.selected += 1;
        renumberPages();
        renderAll();
      });

      document.querySelectorAll("[data-ai-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          const page = currentPage();
          if (!page) return;
          editNotice.classList.remove("active");
          button.disabled = true;
          const originalText = button.textContent;
          button.textContent = "AI 處理中...";
          try {
            const data = await postJson("/api/refine-page", {
              action: button.dataset.aiAction,
              page
            });
            if (!data.page) throw new Error(data.error || "No page returned");
            page.title = data.page.title || page.title;
            page.claim = data.page.claim || page.claim;
            page.blocks = normalizeBlocks(data.page.blocks?.length ? data.page.blocks : page.blocks);
            page.layoutHint = data.page.layoutHint || page.layoutHint;
            page.imageBrief = data.page.imageBrief || page.imageBrief;
            renderAll();
          } catch (error) {
            editNotice.textContent = `AI 輔助失敗：${error.message}`;
            editNotice.classList.add("active");
          } finally {
            button.disabled = false;
            button.textContent = originalText;
          }
        });
      });

      layoutGrid.addEventListener("click", (event) => {
        const card = event.target.closest(".layout-card");
        const page = currentPage();
        if (!card || !page) return;
        page.layoutHint = card.dataset.layout;
        renderAll();
      });

      generatePageImage.addEventListener("click", async () => {
        const page = currentPage();
        if (!page) return;
        imageNotice.classList.remove("active");
        generatePageImage.disabled = true;
        generatePageImage.textContent = "產圖中...";
        try {
          const data = await postJson("/api/generate-image", {
            title: page.title,
            lead: page.claim,
            layout: page.layoutHint,
            purpose: page.imageBrief || "text-free editorial visual",
            design: "editorial"
          });
          if (!data.ok || !data.imageDataUrl) throw new Error(data.error || "Image generation failed");
          page.imageUrl = data.imageDataUrl;
          renderAll();
        } catch (error) {
          imageNotice.textContent = `產圖失敗：${error.message}`;
          imageNotice.classList.add("active");
        } finally {
          generatePageImage.disabled = false;
          generatePageImage.textContent = "產生本頁配圖";
        }
      });

      goStep("content");
    </script>
  </body>
</html>
