<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECH INSIDER Deck Workbench</title>
    <style>
      :root {
        --ink: #102a3a;
        --muted: #607684;
        --navy: #0f2854;
        --royal: #1c4d8d;
        --blue: #4988c4;
        --pale: #bde8f5;
        --paper: #f7f8f0;
        --cream: #fbfaf4;
        --line: #cfe0ea;
        --white: #ffffff;
        --amber: #c98b42;
        --ok: #2e8f7d;
        --shadow: 0 22px 70px rgba(16, 42, 58, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        background:
          linear-gradient(90deg, rgba(247, 248, 240, 0.96), rgba(239, 246, 249, 0.96)),
          var(--paper);
      }

      button,
      textarea,
      select,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 64px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        border-bottom: 1px solid rgba(207, 224, 234, 0.9);
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--navy);
        font-weight: 900;
      }

      .seal {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: var(--white);
        background: var(--navy);
        font-size: 12px;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .shell {
        display: grid;
        grid-template-columns: 220px minmax(430px, 560px) minmax(560px, 1fr);
        gap: 18px;
        padding: 20px;
      }

      .rail,
      .panel,
      .preview-panel {
        border: 1px solid rgba(207, 224, 234, 0.95);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .rail {
        border-radius: 18px;
        padding: 16px;
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .step {
        width: 100%;
        display: grid;
        grid-template-columns: 32px 1fr;
        gap: 10px;
        align-items: start;
        padding: 14px 10px;
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: var(--muted);
        text-align: left;
      }

      .step.active {
        background: rgba(189, 232, 245, 0.44);
        color: var(--navy);
      }

      .step.done .step-num {
        background: var(--ok);
      }

      .step-num {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--white);
        background: var(--royal);
        font-size: 12px;
        font-weight: 900;
      }

      .step-title {
        display: block;
        color: inherit;
        font-size: 14px;
        font-weight: 900;
      }

      .step-text {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.45;
      }

      .panel {
        min-height: calc(100vh - 104px);
        border-radius: 18px;
        overflow: hidden;
      }

      .panel-head {
        padding: 24px 26px 18px;
        border-bottom: 1px solid rgba(207, 224, 234, 0.86);
      }

      .eyebrow {
        margin-bottom: 8px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        color: var(--navy);
        font-size: 26px;
        line-height: 1.25;
      }

      h2 {
        color: var(--navy);
        font-size: 20px;
        line-height: 1.3;
      }

      .desc {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .panel-body {
        padding: 22px 26px 26px;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      textarea,
      select,
      input {
        width: 100%;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 12px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.92);
      }

      textarea {
        min-height: 330px;
        padding: 16px;
        resize: vertical;
        line-height: 1.7;
      }

      select,
      input {
        height: 42px;
        padding: 0 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .field {
        margin-bottom: 18px;
      }

      .button {
        width: 100%;
        height: 48px;
        border: 0;
        border-radius: 12px;
        color: var(--white);
        background: var(--royal);
        font-weight: 900;
      }

      .button.primary {
        background: var(--amber);
      }

      .button.ghost {
        color: var(--royal);
        background: rgba(189, 232, 245, 0.36);
      }

      .button:disabled {
        opacity: 0.62;
      }

      .action-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .action-row.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .small-button {
        height: 38px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 10px;
        color: var(--royal);
        background: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        font-weight: 900;
      }

      .page-list {
        display: grid;
        gap: 10px;
      }

      .page-row {
        width: 100%;
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.86);
        text-align: left;
      }

      .page-row.active {
        border-color: rgba(73, 136, 196, 0.95);
        background: #eef8fb;
      }

      .page-num {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        color: var(--white);
        background: var(--navy);
        font-size: 12px;
        font-weight: 900;
      }

      .page-title {
        color: var(--navy);
        font-size: 14px;
        font-weight: 900;
        line-height: 1.35;
      }

      .page-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .badge {
        padding: 6px 8px;
        border-radius: 999px;
        color: var(--royal);
        background: rgba(189, 232, 245, 0.42);
        font-size: 11px;
        font-weight: 900;
      }

      .editor-card {
        padding: 16px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 16px;
        background: rgba(247, 248, 240, 0.58);
      }

      .editor-card + .editor-card {
        margin-top: 14px;
      }

      .mini-input {
        min-height: 96px;
      }

      .layout-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .layout-card {
        padding: 12px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        text-align: left;
      }

      .layout-card.active {
        border-color: rgba(73, 136, 196, 0.95);
        background: #eef8fb;
      }

      .layout-card strong {
        display: block;
        margin-bottom: 4px;
        color: var(--navy);
        font-size: 13px;
      }

      .layout-card span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .upload-zone {
        display: grid;
        grid-template-columns: 44px 1fr;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border: 1px dashed rgba(73, 136, 196, 0.66);
        border-radius: 14px;
        background: rgba(189, 232, 245, 0.22);
      }

      .upload-zone input {
        display: none;
      }

      .upload-icon {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        color: var(--royal);
        background: var(--white);
        font-size: 20px;
        font-weight: 900;
      }

      .upload-title {
        color: var(--navy);
        font-size: 13px;
        font-weight: 900;
      }

      .upload-text {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .preview-panel {
        min-height: calc(100vh - 104px);
        border-radius: 18px;
        padding: 18px;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 16px;
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .preview-tools {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
      }

      .slide-tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .slide-tab {
        min-width: 38px;
        height: 34px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 10px;
        color: var(--royal);
        background: rgba(255, 255, 255, 0.84);
        font-size: 12px;
        font-weight: 900;
      }

      .slide-tab.active {
        color: var(--white);
        background: var(--navy);
        border-color: var(--navy);
      }

      .slide {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        background: var(--cream);
        box-shadow: 0 28px 82px rgba(16, 42, 58, 0.16);
      }

      .slide-image {
        position: absolute;
        inset: 0 0 0 42%;
        background:
          radial-gradient(circle at 45% 40%, rgba(73, 136, 196, 0.5), transparent 30%),
          linear-gradient(135deg, rgba(189, 232, 245, 0.72), rgba(255, 255, 255, 0.06));
        background-size: cover;
        background-position: center;
      }

      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background:
          linear-gradient(90deg, rgba(251, 250, 244, 1) 0%, rgba(251, 250, 244, 0.98) 42%, rgba(251, 250, 244, 0.74) 58%, rgba(251, 250, 244, 0.16) 82%, rgba(251, 250, 244, 0) 100%),
          linear-gradient(0deg, rgba(251, 250, 244, 0.95), rgba(251, 250, 244, 0) 26%);
      }

      .slide-copy {
        position: absolute;
        z-index: 2;
        left: 5.5%;
        top: 8%;
        width: 45%;
      }

      .slide-kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 38px;
        color: var(--navy);
        font-size: 12px;
        font-weight: 900;
      }

      .slide-kicker::before {
        content: "";
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--navy);
      }

      .slide-title {
        color: var(--navy);
        font-size: clamp(27px, 3.1vw, 48px);
        font-weight: 900;
        line-height: 1.15;
      }

      .hairline {
        width: 92%;
        height: 2px;
        margin: 20px 0 18px;
        background: var(--line);
      }

      .slide-lead {
        color: var(--muted);
        font-size: clamp(13px, 1.1vw, 17px);
        line-height: 1.72;
      }

      .caption-row {
        position: absolute;
        z-index: 2;
        left: 5.5%;
        right: 5.5%;
        bottom: 7%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .caption {
        min-height: 42px;
        display: grid;
        place-items: center;
        padding: 0 8px;
        border: 1px solid rgba(207, 224, 234, 0.95);
        border-radius: 10px;
        color: var(--royal);
        background: rgba(255, 255, 255, 0.82);
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      }

      .footer {
        position: absolute;
        z-index: 2;
        right: 5.5%;
        bottom: 2.7%;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .empty {
        padding: 26px;
        border: 1px dashed rgba(96, 118, 132, 0.42);
        border-radius: 16px;
        color: var(--muted);
        background: rgba(247, 248, 240, 0.58);
        font-size: 14px;
        line-height: 1.65;
      }

      .notice {
        display: none;
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .notice.active {
        display: block;
      }

      @media (max-width: 1260px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .rail,
        .preview-panel {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand"><div class="seal">TI</div><div>Deck Workbench</div></div>
        <div class="status">內容先行，版型與配圖逐頁處理</div>
      </header>

      <main class="shell">
        <nav class="rail" aria-label="workflow">
          <button class="step active" data-step="content" type="button">
            <span class="step-num">1</span>
            <span><span class="step-title">整理內容</span><span class="step-text">長文變成每頁主張</span></span>
          </button>
          <button class="step" data-step="pages" type="button">
            <span class="step-num">2</span>
            <span><span class="step-title">逐頁編輯</span><span class="step-text">每頁選版型、改字、產圖</span></span>
          </button>
          <button class="step" data-step="export" type="button">
            <span class="step-num">3</span>
            <span><span class="step-title">確認輸出</span><span class="step-text">檢查整份 deck</span></span>
          </button>
        </nav>

        <section class="panel">
          <div class="panel-head">
            <div class="eyebrow" id="panel-eyebrow">Step 1</div>
            <h1 id="panel-title">先把長文整理成簡報內容</h1>
            <p class="desc" id="panel-desc">這一步只處理資料：每頁標題、主張、重點。先不要選版型，也不要產圖。</p>
          </div>

          <div class="panel-body">
            <section class="screen active" id="screen-content">
              <div class="field">
                <label for="article-input">文章或資料</label>
                <textarea id="article-input">AI 正在改變內容產業。媒體需要先把長文整理成清楚的每頁主張，再依照每頁主張選擇版型與圖片。圖片不應包含任何文字；標題、內文、標籤與頁碼應該交給 OpenSlide 排版。好的簡報生成工具不該一開始就混合所有控制項，而應該把資料處理、逐頁設計、輸出檢查拆成清楚步驟。</textarea>
              </div>
              <div class="row">
                <div class="field">
                  <label for="audience-input">對象</label>
                  <select id="audience-input">
                    <option>商業讀者</option>
                    <option>高階主管</option>
                    <option>內容團隊</option>
                  </select>
                </div>
                <div class="field">
                  <label for="page-count-input">頁數</label>
                  <select id="page-count-input">
                    <option>12 頁</option>
                    <option>6-8 頁</option>
                    <option>3 頁提案</option>
                    <option>10-12 頁</option>
                  </select>
                </div>
              </div>
              <button class="button primary" id="generate-outline" type="button">生成每頁內容</button>
              <p class="notice" id="content-notice"></p>
            </section>

            <section class="screen" id="screen-pages">
              <div id="page-editor-empty" class="empty">請先在第一步生成每頁內容。生成後，這裡會出現逐頁編輯工具。</div>
              <div id="page-editor" hidden>
                <div class="editor-card">
                  <div class="action-row" style="margin-bottom: 14px">
                    <button class="small-button" id="move-page-up" type="button">上移一頁</button>
                    <button class="small-button" id="move-page-down" type="button">下移一頁</button>
                  </div>
                  <div class="field">
                    <label for="page-title-input">本頁標題</label>
                    <input id="page-title-input" />
                  </div>
                  <div class="field">
                    <label for="page-lead-input">本頁主張</label>
                    <textarea class="mini-input" id="page-lead-input"></textarea>
                  </div>
                  <div class="field">
                    <label for="page-tags-input">底部小區塊</label>
                    <input id="page-tags-input" placeholder="用頓號或逗號分隔，例如：市場、角色、風險、下一步" />
                  </div>
                  <div class="action-row three">
                    <button class="small-button" data-ai-action="sharpen" type="button">AI 強化主張</button>
                    <button class="small-button" data-ai-action="shorten" type="button">AI 精簡文字</button>
                    <button class="small-button" data-ai-action="tags" type="button">AI 建議小區塊</button>
                  </div>
                  <p class="notice" id="edit-notice"></p>
                </div>

                <div class="editor-card">
                  <label>本頁版型</label>
                  <div class="layout-grid" id="layout-grid">
                    <button class="layout-card active" data-layout="Cover" type="button"><strong>Cover</strong><span>大標題加融合式主視覺</span></button>
                    <button class="layout-card" data-layout="Matrix" type="button"><strong>Matrix</strong><span>比較角色、策略或條件</span></button>
                    <button class="layout-card" data-layout="Timeline" type="button"><strong>Timeline</strong><span>事件順序與發展脈絡</span></button>
                    <button class="layout-card" data-layout="Comparison" type="button"><strong>Comparison</strong><span>兩種觀點或方案對照</span></button>
                  </div>
                </div>

                <div class="editor-card">
                  <div class="field">
                    <label for="image-purpose-input">配圖方向</label>
                    <select id="image-purpose-input">
                      <option>讓抽象議題變好懂</option>
                      <option>呈現商業科技場景</option>
                      <option>做成雜誌式主視覺</option>
                      <option>用資料感與流程感表現</option>
                    </select>
                  </div>
                  <label class="upload-zone" for="reference-image">
                    <span class="upload-icon">+</span>
                    <span>
                      <span class="upload-title" id="upload-title">上傳參考圖片</span>
                      <span class="upload-text" id="upload-text">只作為風格參考；產出的配圖仍不放任何文字。</span>
                    </span>
                    <input id="reference-image" type="file" accept="image/*" />
                  </label>
                  <div style="margin-top: 12px">
                    <button class="button" id="generate-page-image" type="button">產生本頁配圖</button>
                  </div>
                  <p class="notice" id="image-notice"></p>
                </div>
              </div>
            </section>

            <section class="screen" id="screen-export">
              <div id="export-empty" class="empty">還沒有內容可以輸出。請先生成每頁內容。</div>
              <div id="export-list" class="page-list"></div>
            </section>
          </div>
        </section>

        <aside class="preview-panel">
          <div class="preview-tools">
            <div>
              <div class="eyebrow">Artifact Preview</div>
              <h2 id="preview-heading">目前預覽</h2>
              <p class="desc" id="preview-note">右側永遠只預覽當前頁，不把所有控制項塞在一起。</p>
            </div>
            <button class="button ghost" id="go-pages" type="button" style="width: 132px">逐頁編輯</button>
          </div>
          <div class="slide-tabs" id="slide-tabs"></div>
          <div class="slide" id="artifact-slide">
            <div class="slide-image" id="slide-image" aria-hidden="true"></div>
            <div class="slide-copy">
              <div class="slide-kicker" id="slide-kicker">TECH INSIDER</div>
              <div class="slide-title" id="slide-title">先把內容整理好，再處理設計</div>
              <div class="hairline"></div>
              <p class="slide-lead" id="slide-lead">這個工作台把資料處理、逐頁設計、配圖和輸出檢查拆開，避免文字與圖片互相打架。</p>
            </div>
            <div class="caption-row">
              <div class="caption" id="caption-1">內容</div>
              <div class="caption" id="caption-2">版型</div>
              <div class="caption" id="caption-3">配圖</div>
              <div class="caption" id="caption-4">輸出</div>
            </div>
            <div class="footer" id="slide-footer">Slide 1｜Draft</div>
          </div>
        </aside>
      </main>
    </div>

    <script>
      const state = {
        step: "content",
        selected: 0,
        referenceImage: false,
        pages: []
      };

      const stepLabels = {
        content: ["Step 1", "先把長文整理成簡報內容", "這一步只處理資料：每頁標題、主張、重點。先不要選版型，也不要產圖。"],
        pages: ["Step 2", "逐頁編輯每張 slide", "一次只處理一頁：改字、選版型、產生本頁配圖。"],
        export: ["Step 3", "確認整份簡報", "檢查每頁是否都有清楚主張、合適版型與必要配圖。"]
      };

      const fallbackTags = ["主張", "重點", "版型", "配圖"];
      const screens = {
        content: document.getElementById("screen-content"),
        pages: document.getElementById("screen-pages"),
        export: document.getElementById("screen-export")
      };

      const articleInput = document.getElementById("article-input");
      const audienceInput = document.getElementById("audience-input");
      const pageCountInput = document.getElementById("page-count-input");
      const imagePurposeInput = document.getElementById("image-purpose-input");
      const generateOutline = document.getElementById("generate-outline");
      const generatePageImage = document.getElementById("generate-page-image");
      const contentNotice = document.getElementById("content-notice");
      const imageNotice = document.getElementById("image-notice");
      const pageEditor = document.getElementById("page-editor");
      const pageEditorEmpty = document.getElementById("page-editor-empty");
      const pageTitleInput = document.getElementById("page-title-input");
      const pageLeadInput = document.getElementById("page-lead-input");
      const pageTagsInput = document.getElementById("page-tags-input");
      const editNotice = document.getElementById("edit-notice");
      const movePageUp = document.getElementById("move-page-up");
      const movePageDown = document.getElementById("move-page-down");
      const layoutGrid = document.getElementById("layout-grid");
      const slideTabs = document.getElementById("slide-tabs");
      const exportList = document.getElementById("export-list");
      const exportEmpty = document.getElementById("export-empty");
      const referenceImage = document.getElementById("reference-image");
      const uploadTitle = document.getElementById("upload-title");
      const uploadText = document.getElementById("upload-text");

      const panelEyebrow = document.getElementById("panel-eyebrow");
      const panelTitle = document.getElementById("panel-title");
      const panelDesc = document.getElementById("panel-desc");
      const previewHeading = document.getElementById("preview-heading");
      const previewNote = document.getElementById("preview-note");
      const slideImage = document.getElementById("slide-image");
      const slideKicker = document.getElementById("slide-kicker");
      const slideTitle = document.getElementById("slide-title");
      const slideLead = document.getElementById("slide-lead");
      const slideFooter = document.getElementById("slide-footer");
      const captions = [
        document.getElementById("caption-1"),
        document.getElementById("caption-2"),
        document.getElementById("caption-3"),
        document.getElementById("caption-4")
      ];

      function goStep(step) {
        state.step = step;
        document.querySelectorAll(".step").forEach((button) => {
          const active = button.dataset.step === step;
          button.classList.toggle("active", active);
          button.classList.toggle("done", button.dataset.step === "content" && state.pages.length > 0);
        });
        Object.entries(screens).forEach(([key, screen]) => screen.classList.toggle("active", key === step));
        const [eyebrow, title, desc] = stepLabels[step];
        panelEyebrow.textContent = eyebrow;
        panelTitle.textContent = title;
        panelDesc.textContent = desc;
        renderAll();
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(`API failed: ${response.status}`);
        return response.json();
      }

      function currentPage() {
        return state.pages[state.selected];
      }

      function normalizePages(pages) {
        return pages.map((page, index) => ({
          page: index + 1,
          title: page.title || `第 ${index + 1} 頁`,
          lead: page.lead || "",
          tags: Array.isArray(page.tags) && page.tags.length ? page.tags.slice(0, 4) : [],
          layout: page.layout || (index === 0 ? "Cover" : ""),
          imageUrl: page.imageUrl || ""
        }));
      }

      function renumberPages() {
        state.pages.forEach((page, index) => {
          page.page = index + 1;
        });
      }

      function parseTags(value) {
        return value.split(/[、,，]/).map((item) => item.trim()).filter(Boolean).slice(0, 4);
      }

      function renderTabs() {
        slideTabs.innerHTML = "";
        state.pages.forEach((page, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = `slide-tab${index === state.selected ? " active" : ""}`;
          tab.textContent = page.page || index + 1;
          tab.addEventListener("click", () => {
            state.selected = index;
            goStep(state.step);
          });
          slideTabs.appendChild(tab);
        });
      }

      function renderEditor() {
        const page = currentPage();
        pageEditor.hidden = !page;
        pageEditorEmpty.style.display = page ? "none" : "block";
        if (!page) return;
        pageTitleInput.value = page.title;
        pageLeadInput.value = page.lead;
        pageTagsInput.value = (page.tags || []).join("、");
        movePageUp.disabled = state.selected === 0;
        movePageDown.disabled = state.selected === state.pages.length - 1;
        document.querySelectorAll(".layout-card").forEach((card) => {
          card.classList.toggle("active", card.dataset.layout === page.layout);
        });
      }

      function renderExport() {
        exportList.innerHTML = "";
        exportEmpty.style.display = state.pages.length ? "none" : "block";
        state.pages.forEach((page, index) => {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `page-row${index === state.selected ? " active" : ""}`;
          row.innerHTML = `
            <div class="page-num">${page.page || index + 1}</div>
            <div><div class="page-title"></div><div class="page-meta"></div></div>
            <div class="badge"></div>
          `;
          row.querySelector(".page-title").textContent = page.title;
          row.querySelector(".page-meta").textContent = page.lead;
          row.querySelector(".badge").textContent = page.imageUrl ? "已有圖" : "未產圖";
          row.addEventListener("click", () => {
            state.selected = index;
            renderAll();
          });
          exportList.appendChild(row);
        });
      }

      function renderPreview() {
        const page = currentPage();
        if (!page) {
          previewHeading.textContent = "目前預覽";
          previewNote.textContent = "先生成內容，這裡會顯示當前頁。";
          slideImage.style.backgroundImage = "";
          slideKicker.textContent = "TECH INSIDER";
          slideTitle.textContent = "先把內容整理好，再處理設計";
          slideLead.textContent = "這個工作台把資料處理、逐頁設計、配圖和輸出檢查拆開，避免文字與圖片互相打架。";
          slideFooter.textContent = "Slide 1｜Draft";
          fallbackTags.forEach((tag, index) => (captions[index].textContent = tag));
          return;
        }
        previewHeading.textContent = `Slide ${page.page || state.selected + 1}`;
        previewNote.textContent = page.layout ? `${page.layout} 版型` : "尚未選版型";
        slideImage.style.backgroundImage = page.imageUrl ? `url("${page.imageUrl}")` : "";
        slideKicker.textContent = `TECH INSIDER｜${page.layout || "未選版型"}`;
        slideTitle.textContent = page.title;
        slideLead.textContent = page.lead;
        slideFooter.textContent = `Slide ${page.page || state.selected + 1}｜${page.layout || "Draft"}`;
        const tags = page.tags.length ? page.tags : ["", "", "", ""];
        captions.forEach((caption, index) => (caption.textContent = tags[index] || ""));
      }

      function renderAll() {
        renderTabs();
        renderEditor();
        renderExport();
        renderPreview();
      }

      document.querySelectorAll(".step").forEach((button) => {
        button.addEventListener("click", () => goStep(button.dataset.step));
      });

      document.getElementById("go-pages").addEventListener("click", () => goStep("pages"));

      generateOutline.addEventListener("click", async () => {
        const article = articleInput.value.trim();
        generateOutline.disabled = true;
        generateOutline.textContent = "整理中...";
        contentNotice.classList.remove("active");
        try {
          const data = await postJson("/api/generate-outline", {
            article,
            audience: audienceInput.value,
            pageCount: pageCountInput.value,
            design: "editorial"
          });
          const pages = data.outline?.pages?.length
            ? data.outline.pages
            : [{ page: 1, title: data.outline?.title || "簡報主張", lead: data.outline?.lead || article.slice(0, 120), tags: data.outline?.captions || fallbackTags }];
          state.pages = normalizePages(pages);
          state.selected = 0;
          if (!data.ok) {
            contentNotice.textContent = `缺少 API key：${(data.missingKeys || []).join(", ")}`;
            contentNotice.classList.add("active");
          }
          goStep("pages");
        } catch (error) {
          contentNotice.textContent = `整理失敗：${error.message}`;
          contentNotice.classList.add("active");
        } finally {
          generateOutline.disabled = false;
          generateOutline.textContent = "生成每頁內容";
        }
      });

      pageTitleInput.addEventListener("input", () => {
        const page = currentPage();
        if (!page) return;
        page.title = pageTitleInput.value;
        renderPreview();
      });

      pageLeadInput.addEventListener("input", () => {
        const page = currentPage();
        if (!page) return;
        page.lead = pageLeadInput.value;
        renderPreview();
      });

      pageTagsInput.addEventListener("input", () => {
        const page = currentPage();
        if (!page) return;
        page.tags = parseTags(pageTagsInput.value);
        renderPreview();
      });

      movePageUp.addEventListener("click", () => {
        if (state.selected <= 0) return;
        const current = state.pages[state.selected];
        state.pages[state.selected] = state.pages[state.selected - 1];
        state.pages[state.selected - 1] = current;
        state.selected -= 1;
        renumberPages();
        renderAll();
      });

      movePageDown.addEventListener("click", () => {
        if (state.selected >= state.pages.length - 1) return;
        const current = state.pages[state.selected];
        state.pages[state.selected] = state.pages[state.selected + 1];
        state.pages[state.selected + 1] = current;
        state.selected += 1;
        renumberPages();
        renderAll();
      });

      document.querySelectorAll("[data-ai-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          const page = currentPage();
          if (!page) return;
          editNotice.classList.remove("active");
          button.disabled = true;
          const originalText = button.textContent;
          button.textContent = "AI 處理中...";
          try {
            const data = await postJson("/api/refine-page", {
              action: button.dataset.aiAction,
              page
            });
            if (!data.page) throw new Error(data.error || "No page returned");
            page.title = data.page.title || page.title;
            page.lead = data.page.lead || page.lead;
            page.tags = Array.isArray(data.page.tags) && data.page.tags.length ? data.page.tags.slice(0, 4) : page.tags;
            if (!data.ok) {
              editNotice.textContent = `AI key 不完整，已使用本機備援：${(data.missingKeys || []).join(", ")}`;
              editNotice.classList.add("active");
            }
            renderAll();
          } catch (error) {
            editNotice.textContent = `AI 輔助失敗：${error.message}`;
            editNotice.classList.add("active");
          } finally {
            button.disabled = false;
            button.textContent = originalText;
          }
        });
      });

      layoutGrid.addEventListener("click", (event) => {
        const card = event.target.closest(".layout-card");
        const page = currentPage();
        if (!card || !page) return;
        page.layout = card.dataset.layout;
        renderAll();
      });

      generatePageImage.addEventListener("click", async () => {
        const page = currentPage();
        if (!page) return;
        imageNotice.classList.remove("active");
        generatePageImage.disabled = true;
        generatePageImage.textContent = "產圖中...";
        try {
          const data = await postJson("/api/generate-image", {
            title: page.title,
            lead: page.lead,
            layout: page.layout,
            purpose: imagePurposeInput.value,
            design: "editorial"
          });
          if (!data.ok || !data.imageDataUrl) throw new Error(data.error || "Image generation failed");
          page.imageUrl = data.imageDataUrl;
          renderAll();
        } catch (error) {
          imageNotice.textContent = `產圖失敗：${error.message}`;
          imageNotice.classList.add("active");
        } finally {
          generatePageImage.disabled = false;
          generatePageImage.textContent = "產生本頁配圖";
        }
      });

      referenceImage.addEventListener("change", () => {
        const file = referenceImage.files && referenceImage.files[0];
        if (!file) return;
        state.referenceImage = true;
        uploadTitle.textContent = file.name;
        uploadText.textContent = "已加入參考圖。產圖仍會要求不出現任何文字。";
      });

      goStep("content");
    </script>
  </body>
</html>
